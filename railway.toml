[build]
builder = "dockerfile"

[deploy]
# Deploying does NOT auto-run a job unless RUN_JOB is set. With RUN_JOB set, the
# job runs as the main process and resumes from its checkpoint after any restart;
# the per-job completion sentinel prevents re-running a finished job. "always" is
# safe here because of that sentinel — a recycled container resumes an in-progress
# job or idles if the job already completed.
startCommand = "bash entrypoint.sh"
restartPolicyType = "always"
